# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name openclaw.ping24.io;

    if ($host = openclaw.ping24.io) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

# HTTPS - Main
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name openclaw.ping24.io;

    ssl_certificate /etc/letsencrypt/live/openclaw.ping24.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw.ping24.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

