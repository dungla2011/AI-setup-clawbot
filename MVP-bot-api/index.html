<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot MVP - Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            transition: background 0.3s;
        }

        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-menu a.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(1) {
            animation-delay: 0s;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .info {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Bot MVP</h1>
            <p>Hỏi về đơn hàng, doanh thu, trạng thái...</p>
            <div class="nav-menu">
                <a href="index.html" class="active">💬 Chat</a>
                <a href="stats.html">📊 Thống kê</a>
                <a href="http://localhost:8100/docs" target="_blank">📖 API Docs</a>
            </div>
        </div>

        <div class="chat-messages" id="messages">
            <div class="message bot">
                <div class="message-content">
                    Xin chào! 👋 Mình là bot bán hàng thông minh. Bạn có thể hỏi mình về:
                    <br>- 📦 Danh sách đơn hàng
                    <br>- 📊 Doanh thu
                    <br>- ✅ Trạng thái đơn hàng
                </div>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Nhập tin nhắn..." 
                onkeyup="handleKeyUp(event)"
            >
            <button onclick="sendMessage()" id="sendBtn">Gửi</button>
        </div>
        <div class="info">Conversation ID: <span id="convId">-</span></div>
    </div>

    <script>
        // API_URL injected from .env by web_server.py
        // Fallback to localhost if not injected
        const API_URL = "{{API_URL}}".includes('{{') ? `http://${window.location.hostname}:8000` : "{{API_URL}}";
        
        let conversationId = null;
        let messageInput = document.getElementById("messageInput");
        let sendBtn = document.getElementById("sendBtn");
        let messagesDiv = document.getElementById("messages");
        let convIdSpan = document.getElementById("convId");
        
        console.log("🚀 API URL:", API_URL);
        console.log("🌐 Hostname:", hostname);

        function handleKeyUp(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Disable input
            messageInput.disabled = true;
            sendBtn.disabled = true;

            // Add user message
            addMessage(message, "user");
            messageInput.value = "";

            // Add loading indicator
            const loadingId = "loading-" + Date.now();
            addLoading(loadingId);

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                
                // Save conversation ID
                conversationId = data.conversation_id;
                convIdSpan.textContent = conversationId.substring(0, 8) + "...";

                // Remove loading and add bot response
                removeLoading(loadingId);
                addMessage(data.bot_response, "bot");

            } catch (error) {
                removeLoading(loadingId);
                addMessage("❌ Lỗi: " + error.message, "bot");
                console.error("Error:", error);
            } finally {
                // Re-enable input
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addLoading(id) {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message bot";
            messageDiv.id = id;
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "loading";
            contentDiv.innerHTML = "<span></span><span></span><span></span>";
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoading(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
        }

        // Focus on input when page loads
        window.addEventListener("load", () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
