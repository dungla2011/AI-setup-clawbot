<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot MVP - Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="chat-shell">

  <!-- Shared Navbar -->
  <nav class="navbar app-navbar navbar-expand-lg">
    <a class="navbar-brand" href="index.html">&#x1F916; Bot MVP</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link active" href="index.html">&#x1F4AC; Chat</a></li>
        <li class="nav-item"><a class="nav-link" href="stats.html">&#x1F4CA; Thống kê</a></li>
        <li class="nav-item"><a class="nav-link" href="#" target="_blank" id="navDocs">&#x1F4D6; API Docs</a></li>
      </ul>
      <div class="usage-pill">
        <div class="stat-item"><span class="stat-label">Requests:</span><span class="stat-value" id="statRequests">&mdash;</span></div>
        <span class="stat-sep">|</span>
        <div class="stat-item"><span class="stat-label">Tokens:</span><span class="stat-value" id="statTokens">&mdash;</span></div>
        <span class="stat-sep">|</span>
        <div class="stat-item"><span class="stat-label">Cost:</span><span class="stat-value" id="statCost">&mdash;</span></div>
      </div>
    </div>
  </nav>

  <!-- Chat Messages -->
  <div class="chat-messages" id="messages">
    <div class="message bot">
      <div class="message-content">
        <span class="message-text">Xin chào! &#x1F44B; Mình là bot bán hàng thông minh. Bạn có thể hỏi mình về:<br>
        - &#x1F4E6; Danh sách đơn hàng<br>
        - &#x1F4CA; Doanh thu<br>
        - &#x2705; Trạng thái đơn hàng</span>
        <span class="message-time" id="welcomeTime"></span>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <input type="text" class="chat-input" id="messageInput" placeholder="Nhập tin nhắn..." onkeyup="handleKeyUp(event)">
    <button class="btn btn-grad px-4" onclick="sendMessage()" id="sendBtn">&#x1F4E4; Gửi</button>
    <button class="btn btn-new px-3" onclick="startNewConversation()" title="Ctrl+N">&#x1F504; Mới</button>
  </div>
  <div class="conv-info">Conversation ID: <span id="convId">-</span></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_PORT = "{{API_PORT}}".includes('{{') ? "8100" : "{{API_PORT}}";
    const API_URL  = "{{API_URL}}".includes('{{') ? `http://${window.location.hostname}:${API_PORT}` : "{{API_URL}}";

    document.getElementById('navDocs').href = `${API_URL}/docs`;

    let conversationId = null;
    const messageInput = document.getElementById("messageInput");
    const sendBtn      = document.getElementById("sendBtn");
    const messagesDiv  = document.getElementById("messages");
    const convIdSpan   = document.getElementById("convId");

    function handleKeyUp(e) {
      if (e.key === "Enter" && !e.shiftKey) sendMessage();
    }

    function fmtTime(timestamp) {
      const ts = timestamp ? new Date(timestamp) : new Date();
      return ts.toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, sender, timestamp) {
      const wrap = document.createElement("div");
      wrap.className = `message ${sender}`;
      const bubble = document.createElement("div");
      bubble.className = "message-content";
      const textSpan = document.createElement("span");
      textSpan.className = "message-text";
      textSpan.textContent = text;
      const timeSpan = document.createElement("span");
      timeSpan.className = "message-time";
      timeSpan.textContent = fmtTime(timestamp);
      bubble.appendChild(textSpan);
      bubble.appendChild(timeSpan);
      wrap.appendChild(bubble);
      messagesDiv.appendChild(wrap);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addLoading(id) {
      const wrap = document.createElement("div");
      wrap.className = "message bot";
      wrap.id = id;
      const bubble = document.createElement("div");
      bubble.className = "message-content";
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      wrap.appendChild(bubble);
      messagesDiv.appendChild(wrap);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeLoading(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;
      messageInput.disabled = true;
      sendBtn.disabled = true;
      addMessage(message, "user");
      messageInput.value = "";
      const loadingId = "loading-" + Date.now();
      addLoading(loadingId);
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, conversation_id: conversationId }),
        });
        if (!response.ok) throw new Error(`API error: ${response.status}`);
        const data = await response.json();
        conversationId = data.conversation_id;
        convIdSpan.textContent = conversationId.substring(0, 8) + "...";
        localStorage.setItem('lastConversationId', conversationId);
        window.history.replaceState({}, '', `?conv_id=${conversationId}`);
        removeLoading(loadingId);
        addMessage(data.bot_response, "bot");
        updateUsageStats();
      } catch (error) {
        removeLoading(loadingId);
        addMessage("&#x274C; Lỗi: " + error.message, "bot");
        console.error("Error:", error);
      } finally {
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    async function updateUsageStats() {
      try {
        const res = await fetch(`${API_URL}/stats`);
        if (!res.ok) return;
        const data = await res.json();
        const totalTokens = (data.total_input_tokens || 0) + (data.total_output_tokens || 0);
        const cost = data.total_cost_usd || 0;
        document.getElementById('statRequests').textContent = (data.total_requests || 0).toLocaleString();
        document.getElementById('statTokens').textContent = totalTokens >= 1000 ? (totalTokens/1000).toFixed(1)+'K' : totalTokens.toLocaleString();
        document.getElementById('statCost').textContent = '$' + cost.toFixed(4);
      } catch(e) { console.warn('Stats error', e); }
    }

    async function loadConversationHistory() {
      const urlParams = new URLSearchParams(window.location.search);
      let savedConvId = urlParams.get('conv_id') || localStorage.getItem('lastConversationId');
      if (!savedConvId) {
        try {
          const res = await fetch(`${API_URL}/conversations/latest`);
          if (res.ok) { const d = await res.json(); savedConvId = d.conversation_id; }
        } catch(e) {}
      }
      if (savedConvId) {
        try {
          const res = await fetch(`${API_URL}/conversations/${savedConvId}`);
          if (res.ok) {
            const data = await res.json();
            conversationId = data.conversation_id;
            convIdSpan.textContent = conversationId.substring(0, 8) + "...";
            if (data.history && data.history.length > 0) {
              data.history.forEach(msg => addMessage(msg.content, msg.role, msg.created_at));
            }
          }
        } catch(e) {}
      }
    }

    function startNewConversation() {
      if (confirm("Bắt đầu cuộc hội thoại mới?")) {
        conversationId = null;
        messagesDiv.innerHTML = "";
        localStorage.removeItem('lastConversationId');
        window.history.replaceState({}, '', window.location.pathname);
        messageInput.focus();
      }
    }

    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'n') { e.preventDefault(); startNewConversation(); }
    });

    window.addEventListener("load", () => {
      document.getElementById('welcomeTime').textContent = fmtTime();
      loadConversationHistory();
      updateUsageStats();
      messageInput.focus();
    });
  </script>
</body>
</html>
