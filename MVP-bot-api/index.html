<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot MVP - Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 100%;
            background: white;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 16px;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex: 1;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            transition: background 0.3s;
            white-space: nowrap;
        }

        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-menu a.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .usage-stats {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .usage-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .usage-stats .stat-sep {
            opacity: 0.4;
        }

        .usage-stats .stat-label {
            opacity: 0.75;
            font-size: 11px;
        }

        .usage-stats .stat-value {
            font-weight: 700;
            font-size: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        button.new-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(1) {
            animation-delay: 0s;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .info {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">🤖 Bot MVP</div>
            <div class="nav-menu">
                <a href="index.html" class="active">💬 Chat</a>
                <a href="stats.html">📊 Thống kê</a>
                <a href="http://localhost:8100/docs" target="_blank">📖 API Docs</a>
            </div>
            <div class="usage-stats" id="usageStats">
                <div class="stat-item"><span class="stat-label">Requests:</span><span class="stat-value" id="statRequests">—</span></div>
                <span class="stat-sep">|</span>
                <div class="stat-item"><span class="stat-label">Tokens:</span><span class="stat-value" id="statTokens">—</span></div>
                <span class="stat-sep">|</span>
                <div class="stat-item"><span class="stat-label">Cost:</span><span class="stat-value" id="statCost">—</span></div>
            </div>
        </div>

        <div class="chat-messages" id="messages">
            <div class="message bot">
                <div class="message-content">
                    Xin chào! 👋 Mình là bot bán hàng thông minh. Bạn có thể hỏi mình về:
                    <br>- 📦 Danh sách đơn hàng
                    <br>- 📊 Doanh thu
                    <br>- ✅ Trạng thái đơn hàng
                </div>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Nhập tin nhắn..." 
                onkeyup="handleKeyUp(event)"
            >
            <button onclick="sendMessage()" id="sendBtn">📤 Gửi</button>
            <button class="new-btn" onclick="startNewConversation()" title="Ctrl+N">🔄 Mới</button>
        </div>
        <div class="info">Conversation ID: <span id="convId">-</span></div>
    </div>

    <script>
        // API_URL injected from .env by web_server.py
        // Fallback to localhost if not injected
        const API_PORT = "{{API_PORT}}".includes('{{') ? "8100" : "{{API_PORT}}";
        const API_URL = "{{API_URL}}".includes('{{') ? `http://${window.location.hostname}:${API_PORT}` : "{{API_URL}}";
        
        let conversationId = null;
        let messageInput = document.getElementById("messageInput");
        let sendBtn = document.getElementById("sendBtn");
        let messagesDiv = document.getElementById("messages");
        let convIdSpan = document.getElementById("convId");
        
        console.log("🚀 API URL:", API_URL);
        console.log("🌐 Hostname:", window.location.hostname);

        function handleKeyUp(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Disable input
            messageInput.disabled = true;
            sendBtn.disabled = true;

            // Add user message
            addMessage(message, "user");
            messageInput.value = "";

            // Add loading indicator
            const loadingId = "loading-" + Date.now();
            addLoading(loadingId);

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                
                // Save conversation ID
                conversationId = data.conversation_id;
                convIdSpan.textContent = conversationId.substring(0, 8) + "...";
                
                // Save to localStorage
                localStorage.setItem('lastConversationId', conversationId);
                
                // Update URL with conversation ID
                window.history.replaceState({}, '', `?conv_id=${conversationId}`);

                // Remove loading and add bot response
                removeLoading(loadingId);
                addMessage(data.bot_response, "bot");
                
                console.log("💬 Chat saved to conversation:", conversationId);
                updateUsageStats();

            } catch (error) {
                removeLoading(loadingId);
                addMessage("❌ Lỗi: " + error.message, "bot");
                console.error("Error:", error);
            } finally {
                // Re-enable input
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addLoading(id) {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message bot";
            messageDiv.id = id;
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "loading";
            contentDiv.innerHTML = "<span></span><span></span><span></span>";
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoading(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
        }
        
        // Fetch and display usage stats in the header
        async function updateUsageStats() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                if (!res.ok) return;
                const data = await res.json();
                const totalTokens = (data.total_input_tokens || 0) + (data.total_output_tokens || 0);
                const cost = data.total_cost_usd || 0;
                document.getElementById('statRequests').textContent = (data.total_requests || 0).toLocaleString();
                document.getElementById('statTokens').textContent = totalTokens >= 1000
                    ? (totalTokens / 1000).toFixed(1) + 'K'
                    : totalTokens.toLocaleString();
                document.getElementById('statCost').textContent = '$' + cost.toFixed(4);
            } catch (e) {
                console.warn('⚠️ Could not load stats:', e);
            }
        }

        // Load conversation history from URL parameter, localStorage, or latest
        async function loadConversationHistory() {
            console.log("🔍 loadConversationHistory() started");
            
            // Check URL params for conversation_id
            const urlParams = new URLSearchParams(window.location.search);
            const convIdFromUrl = urlParams.get('conv_id');
            
            // Or check localStorage for recent conversation
            let savedConvId = convIdFromUrl || localStorage.getItem('lastConversationId');
            
            // If no saved conversation, try to load the latest one
            if (!savedConvId) {
                try {
                    console.log("📍 No saved conversation, loading latest...");
                    console.log("🔗 Calling: " + API_URL + "/conversations/latest");
                    const response = await fetch(`${API_URL}/conversations/latest`);
                    console.log("📊 Response status:", response.status);
                    if (response.ok) {
                        const data = await response.json();
                        savedConvId = data.conversation_id;
                        console.log("✅ Loaded latest conversation:", savedConvId);
                    } else {
                        const text = await response.text();
                        console.error("❌ Latest endpoint error:", response.status, text);
                    }
                } catch (error) {
                    console.error("❌ Fetch error:", error);
                }
            } else {
                console.log("✅ Using saved conversation:", savedConvId);
            }
            
            // Load the conversation
            if (savedConvId) {
                try {
                    console.log("🔗 Calling: " + API_URL + "/conversations/" + savedConvId);
                    const response = await fetch(`${API_URL}/conversations/${savedConvId}`);
                    console.log("📊 Response status:", response.status);
                    if (response.ok) {
                        const data = await response.json();
                        conversationId = data.conversation_id;
                        convIdSpan.textContent = conversationId.substring(0, 8) + "...";
                        
                        // Load all previous messages
                        if (data.history && data.history.length > 0) {
                            data.history.forEach(msg => {
                                addMessage(msg.content, msg.role);
                            });
                            console.log("✅ Loaded conversation history:", data.history.length, "messages");
                        } else {
                            console.log("⚠️ No messages in history");
                        }
                    } else {
                        const text = await response.text();
                        console.error("❌ Conversation endpoint error:", response.status, text);
                    }
                } catch (error) {
                    console.error("❌ Fetch error:", error);
                }
            } else {
                console.log("⚠️ No conversation ID found");
            }
        }
        
        // Start new conversation
        function startNewConversation() {
            if (confirm("Bắt đầu cuộc hội thoại mới?")) {
                conversationId = null;
                messagesDiv.innerHTML = "";
                localStorage.removeItem('lastConversationId');
                window.history.replaceState({}, '', window.location.pathname);
                messageInput.focus();
                console.log("🔄 New conversation started");
            }
        }
        
        // Add keyboard shortcut Ctrl+N for new conversation
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                startNewConversation();
            }
        });

        // Focus on input when page loads
        window.addEventListener("load", () => {
            loadConversationHistory();
            updateUsageStats();
            messageInput.focus();
        });
    </script>
</body>
</html>
