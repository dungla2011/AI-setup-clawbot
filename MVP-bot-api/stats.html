<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot MVP - Usage Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .nav-menu a {
            color: #667eea;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .nav-menu a:hover {
            background: #f0f0f0;
        }

        .nav-menu a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .stat-card .subtext {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .sessions {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .sessions h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f7f7f7;
            color: #667eea;
            font-weight: 600;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .button-group {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 0 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .cost-highlight {
            color: #f5576c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Bot MVP - Usage Statistics</h1>
            <p>Theo dõi chi phí sử dụng Claude API</p>
            <div class="nav-menu">
                <a href="index.html">💬 Chat</a>
                <a href="stats.html" class="active">📊 Thống kê</a>
                <a href="http://localhost:8100/docs" target="_blank">📖 API Docs</a>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="loading">Đang tải...</div>
        </div>

        <div class="sessions" id="sessionsTable" style="display:none;">
            <h2>Lịch sử gần đây</h2>
            <table>
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Model</th>
                        <th>Input Tokens</th>
                        <th>Output Tokens</th>
                        <th>Chi phí (USD)</th>
                    </tr>
                </thead>
                <tbody id="sessionsBody">
                </tbody>
            </table>
            
            <div class="button-group">
                <button onclick="refreshStats()">🔄 Làm mới</button>
                <button class="danger" onclick="resetStats()">🗑️ Xóa thống kê</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = `http://${window.location.hostname}:8100`;
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                
                displayStats(data);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = 
                    '<div class="loading">❌ Lỗi kết nối API</div>';
                console.error('Error:', error);
            }
        }

        function displayStats(data) {
            // Display stat cards
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <h3>Tổng requests</h3>
                    <div class="value">${data.total_requests}</div>
                    <div class="subtext">API calls</div>
                </div>
                <div class="stat-card">
                    <h3>Total Tokens</h3>
                    <div class="value">${data.total_tokens.toLocaleString()}</div>
                    <div class="subtext">${data.total_input_tokens.toLocaleString()} in / ${data.total_output_tokens.toLocaleString()} out</div>
                </div>
                <div class="stat-card">
                    <h3>Chi phí (USD)</h3>
                    <div class="value cost-highlight">$${data.total_cost_usd}</div>
                    <div class="subtext">≈ ${data.total_cost_vnd.toLocaleString()} VNĐ</div>
                </div>
            `;

            // Display recent sessions
            const tbody = document.getElementById('sessionsBody');
            tbody.innerHTML = '';
            
            if (data.recent_sessions && data.recent_sessions.length > 0) {
                document.getElementById('sessionsTable').style.display = 'block';
                
                data.recent_sessions.reverse().forEach(session => {
                    const row = document.createElement('tr');
                    const time = new Date(session.timestamp).toLocaleString('vi-VN');
                    
                    row.innerHTML = `
                        <td>${time}</td>
                        <td>${session.model.split('-')[1]}</td>
                        <td>${session.input_tokens.toLocaleString()}</td>
                        <td>${session.output_tokens.toLocaleString()}</td>
                        <td class="cost-highlight">$${session.cost_usd.toFixed(6)}</td>
                    `;
                    tbody.appendChild(row);
                });
            }
        }

        async function resetStats() {
            if (!confirm('Bạn có chắc muốn xóa tất cả thống kê?')) {
                return;
            }
            
            try {
                await fetch(`${API_URL}/stats`, { method: 'DELETE' });
                alert('✅ Đã xóa thống kê');
                loadStats();
            } catch (error) {
                alert('❌ Lỗi: ' + error.message);
            }
        }

        function refreshStats() {
            loadStats();
        }

        // Load stats on page load
        window.addEventListener('load', loadStats);

        // Auto-refresh every 10 seconds
        setInterval(loadStats, 10000);
    </script>
</body>
</html>
