<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot MVP - Thống kê</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="stats-shell">

  <!-- Shared Navbar -->
  <nav class="navbar app-navbar navbar-expand-lg">
    <a class="navbar-brand" href="index.html">&#x1F916; Bot MVP</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">&#x1F4AC; Chat</a></li>
        <li class="nav-item"><a class="nav-link active" href="stats.html">&#x1F4CA; Thống kê</a></li>
        <li class="nav-item"><a class="nav-link" href="#" target="_blank" id="navDocs">&#x1F4D6; API Docs</a></li>
      </ul>
      <div class="usage-pill">
        <div class="stat-item"><span class="stat-label">Requests:</span><span class="stat-value" id="statRequests">&mdash;</span></div>
        <span class="stat-sep">|</span>
        <div class="stat-item"><span class="stat-label">Tokens:</span><span class="stat-value" id="statTokens">&mdash;</span></div>
        <span class="stat-sep">|</span>
        <div class="stat-item"><span class="stat-label">Cost:</span><span class="stat-value" id="statCost">&mdash;</span></div>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="stats-content">

    <!-- Stat Cards -->
    <div class="row g-3 mb-4" id="statsGrid">
      <div class="col-12"><div class="loading-placeholder">Đang tải...</div></div>
    </div>

    <!-- Sessions Table -->
    <div class="sessions-card" id="sessionsTable" style="display:none;">
      <h5>Lịch sử gần đây</h5>
      <div class="table-responsive">
        <table class="table table-hover table-sm">
          <thead class="table-light">
            <tr>
              <th>Thời gian</th>
              <th>Model</th>
              <th>Input Tokens</th>
              <th>Output Tokens</th>
              <th>Chi phí (USD)</th>
            </tr>
          </thead>
          <tbody id="sessionsBody"></tbody>
        </table>
      </div>
      <div class="d-flex gap-2 justify-content-center mt-3">
        <button class="btn btn-grad px-4" onclick="refreshStats()">&#x1F504; Làm mới</button>
        <button class="btn btn-danger-grad px-4" onclick="resetStats()">&#x1F5D1; Xóa thống kê</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_PORT = "{{API_PORT}}".includes('{{') ? "8100" : "{{API_PORT}}";
    const API_URL  = "{{API_URL}}".includes('{{') ? `http://${window.location.hostname}:${API_PORT}` : "{{API_URL}}";

    document.getElementById('navDocs').href = `${API_URL}/docs`;

    async function loadStats() {
      try {
        const response = await fetch(`${API_URL}/stats`);
        const data = await response.json();
        displayStats(data);
        updateHeaderStats(data);
      } catch (error) {
        document.getElementById('statsGrid').innerHTML =
          '<div class="col-12"><div class="loading-placeholder">&#x274C; Lỗi kết nối API</div></div>';
        console.error('Error:', error);
      }
    }

    function updateHeaderStats(data) {
      const totalTokens = (data.total_input_tokens || 0) + (data.total_output_tokens || 0);
      const cost = data.total_cost_usd || 0;
      document.getElementById('statRequests').textContent = (data.total_requests || 0).toLocaleString();
      document.getElementById('statTokens').textContent = totalTokens >= 1000 ? (totalTokens/1000).toFixed(1)+'K' : totalTokens.toLocaleString();
      document.getElementById('statCost').textContent = '$' + cost.toFixed(4);
    }

    function displayStats(data) {
      document.getElementById('statsGrid').innerHTML = `
        <div class="col-sm-6 col-lg-4">
          <div class="stat-card">
            <div class="card-label">Tổng Requests</div>
            <div class="card-value">${data.total_requests}</div>
            <div class="card-sub">API calls</div>
          </div>
        </div>
        <div class="col-sm-6 col-lg-4">
          <div class="stat-card">
            <div class="card-label">Total Tokens</div>
            <div class="card-value">${data.total_tokens.toLocaleString()}</div>
            <div class="card-sub">${data.total_input_tokens.toLocaleString()} in / ${data.total_output_tokens.toLocaleString()} out</div>
          </div>
        </div>
        <div class="col-sm-12 col-lg-4">
          <div class="stat-card">
            <div class="card-label">Chi phí (USD)</div>
            <div class="card-value cost-highlight">$${data.total_cost_usd}</div>
            <div class="card-sub">&#x2248; ${data.total_cost_vnd.toLocaleString()} VNĐ</div>
          </div>
        </div>
      `;

      const tbody = document.getElementById('sessionsBody');
      tbody.innerHTML = '';
      if (data.recent_sessions && data.recent_sessions.length > 0) {
        document.getElementById('sessionsTable').style.display = 'block';
        data.recent_sessions.reverse().forEach(session => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${new Date(session.timestamp).toLocaleString('vi-VN')}</td>
            <td>${session.model.split('-')[1]}</td>
            <td>${session.input_tokens.toLocaleString()}</td>
            <td>${session.output_tokens.toLocaleString()}</td>
            <td class="cost-highlight">$${session.cost_usd.toFixed(6)}</td>
          `;
          tbody.appendChild(row);
        });
      }
    }

    async function resetStats() {
      if (!confirm('Bạn có chắc muốn xóa tất cả thống kê?')) return;
      try {
        await fetch(`${API_URL}/stats`, { method: 'DELETE' });
        alert('&#x2705; Đã xóa thống kê');
        loadStats();
      } catch (error) {
        alert('&#x274C; Lỗi: ' + error.message);
      }
    }

    function refreshStats() { loadStats(); }

    window.addEventListener('load', loadStats);
    setInterval(loadStats, 10000);
  </script>
</body>
</html>
